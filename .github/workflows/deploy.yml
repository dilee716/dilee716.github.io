name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Set Astro site and base
        id: astro
        run: |
          repo="${GITHUB_REPOSITORY##*/}"
          owner="${GITHUB_REPOSITORY_OWNER}"
          if [ "$repo" = "${owner}.github.io" ]; then
            echo "base=" >> "$GITHUB_OUTPUT"
            if [ -f public/CNAME ]; then
              host="$(tr -d '[:space:]' < public/CNAME)"
              echo "site=https://${host}" >> "$GITHUB_OUTPUT"
            else
              echo "site=https://${owner}.github.io" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "base=/$repo" >> "$GITHUB_OUTPUT"
            echo "site=https://${owner}.github.io/${repo}" >> "$GITHUB_OUTPUT"
          fi

      - run: npm ci
      - run: npm run build
        env:
          ASTRO_SITE: ${{ steps.astro.outputs.site }}
          ASTRO_BASE: ${{ steps.astro.outputs.base }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
